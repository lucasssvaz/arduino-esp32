name: Coverage

# Builds QEMU-capable test sketches with gcov instrumentation, runs them under
# QEMU, then collects .gcda data and generates an HTML + XML + JSON coverage
# report filtered to Arduino source files only (cores/ and libraries/).
# IDF prebuilt blobs are never instrumented, so no extra exclusion is needed.
#
# Per-chip JSON tracefiles are merged into a single combined report at the end.

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]
    branches:
      - master
      - "release/**"

concurrency:
  group: coverage-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  coverage:
    name: Coverage ${{ matrix.chip }} ${{ matrix.type }}
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'coverage')
    runs-on: ubuntu-latest
    env:
      QEMU_INSTALL_PATH: "$HOME"
    strategy:
      fail-fast: false
      matrix:
        chip: [esp32, esp32c3]
        type: [validation]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Get libs cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          key: libs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package/package_esp32_index.template.json', 'tools/get.py') }}
          path: |
            ./tools/dist
            ./tools/esp32-arduino-libs
            ./tools/esptool
            ./tools/mk*
            ./tools/openocd-esp32
            ./tools/riscv32-*
            ./tools/xtensa-*

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.0.4
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: tests/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install -U pip
          pip install -r tests/requirements.txt
          pip install gcovr

      - name: Install APT dependencies
        uses: awalsh128/cache-apt-pkgs-action@5902b33ae29014e6ca012c5d8025d4346556bd40 # v1.4.3
        with:
          packages: libpixman-1-0 libnuma1 libglib2.0-0 libslirp0 libsdl2-2.0-0
          version: 1.0

      - name: Get QEMU version
        id: get-qemu-version
        uses: pozetroninc/github-action-get-latest-release@2a61c339ea7ef0a336d1daa35ef0cb1418e7676c # v0.8.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          owner: espressif
          repo: qemu
          excludes: prerelease, draft

      - name: Cache QEMU
        id: cache-qemu
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/qemu
          key: qemu-${{ steps.get-qemu-version.outputs.release }}-${{ hashFiles('.github/workflows/tests_qemu.yml') }}

      - name: Download QEMU
        if: steps.cache-qemu.outputs.cache-hit != 'true'
        run: |
          cd ${{ env.QEMU_INSTALL_PATH }}
          underscore_release=$(echo ${{ steps.get-qemu-version.outputs.release }} | sed 's/\-/_/g')
          curl -L https://github.com/espressif/qemu/releases/download/${{ steps.get-qemu-version.outputs.release }}/qemu-riscv32-softmmu-${underscore_release}-x86_64-linux-gnu.tar.xz > qemu-riscv32.tar.xz
          curl -L https://github.com/espressif/qemu/releases/download/${{ steps.get-qemu-version.outputs.release }}/qemu-xtensa-softmmu-${underscore_release}-x86_64-linux-gnu.tar.xz > qemu-xtensa.tar.xz
          tar -xf qemu-riscv32.tar.xz
          tar -xf qemu-xtensa.tar.xz
          rm qemu-*
          echo "QEMU_PATH=${{ env.QEMU_INSTALL_PATH }}/qemu" >> $GITHUB_ENV

      - name: Set QEMU_PATH (cache hit)
        if: steps.cache-qemu.outputs.cache-hit == 'true'
        run: echo "QEMU_PATH=${{ env.QEMU_INSTALL_PATH }}/qemu" >> $GITHUB_ENV

      - name: Build tests with coverage instrumentation
        run: |
          bash .github/scripts/tests_build.sh \
            -c -type ${{ matrix.type }} -t ${{ matrix.chip }} \
            --coverage

      - name: Run tests under QEMU
        run: |
          QEMU_PATH="${{ env.QEMU_INSTALL_PATH }}" \
            bash .github/scripts/tests_run.sh \
              -c -type ${{ matrix.type }} -t ${{ matrix.chip }} -i 0 -m 1 -Q

      - name: Generate coverage report
        run: |
          bash .github/scripts/coverage_report.sh \
            -t ${{ matrix.chip }} \
            -b "$HOME/.arduino/tests/${{ matrix.chip }}" \
            -o "coverage/${{ matrix.chip }}" \
            -j "coverage/${{ matrix.chip }}.json" \
            -x "coverage/${{ matrix.chip }}.xml"

      - name: Upload per-chip coverage artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: coverage-${{ matrix.chip }}-${{ matrix.type }}
          path: coverage/

  merge-coverage:
    name: Merge coverage reports
    needs: coverage
    runs-on: ubuntu-latest
    if: always() && needs.coverage.result != 'cancelled'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          sparse-checkout: |
            .github/scripts
            tools

      - name: Get libs cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          key: libs-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package/package_esp32_index.template.json', 'tools/get.py') }}
          path: |
            ./tools/dist
            ./tools/esp32-arduino-libs
            ./tools/esptool
            ./tools/mk*
            ./tools/openocd-esp32
            ./tools/riscv32-*
            ./tools/xtensa-*

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.0.4
        with:
          python-version: "3.x"

      - name: Install gcovr
        run: pip install gcovr

      - name: Download per-chip coverage artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          pattern: coverage-*
          path: artifacts/

      - name: Merge tracefiles and generate combined report
        run: |
          source .github/scripts/socs_config.sh

          # Collect all per-chip JSON tracefiles that were produced
          tracefiles=()
          for f in artifacts/**/*.json; do
            [ -f "$f" ] && tracefiles+=("-a" "$f")
          done

          if [ ${#tracefiles[@]} -eq 0 ]; then
            echo "No JSON tracefiles found – nothing to merge."
            exit 0
          fi

          # Use esp32 (xtensa) gcov for the merged report; it can read any
          # JSON tracefile regardless of the original target architecture.
          gcov_tool="./tools/xtensa-esp-elf/bin/xtensa-esp-elf-gcov"
          if [ ! -x "$gcov_tool" ]; then
            echo "WARNING: xtensa gcov not found; falling back to system gcov"
            gcov_tool="gcov"
          fi

          mkdir -p combined_coverage
          gcovr \
            --gcov-executable "$gcov_tool" \
            --root . \
            --filter 'cores/' \
            --filter 'libraries/' \
            "${tracefiles[@]}" \
            --html-details combined_coverage/index.html \
            --xml combined_coverage/coverage.xml \
            --json combined_coverage/coverage.json

          echo "Combined coverage report generated."

      - name: Upload combined coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: coverage-combined
          path: combined_coverage/
